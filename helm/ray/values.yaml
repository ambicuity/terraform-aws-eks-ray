#       ray.io/node-type: worker
#       ray.io/resource-type: gpu
#       gpu-group: inference
#       app: ray
#       component: gpu-worker
#     initContainers: []

autoscaler:
  enabled: true
  enableInTreeAutoscaling: true
  idleTimeoutSeconds: 30
  upscalingMode: Default
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
