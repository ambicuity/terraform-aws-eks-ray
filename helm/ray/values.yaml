nameOverride: ""
fullnameOverride: ""

rayVersion: "2.9.0"

image:
  repository: rayproject/ray
  tag: 2.9.0-py310
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

head:
  service:
    type: ClusterIP

  rayStartParams:
    dashboard-host: "0.0.0.0"

  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "4"
      memory: "16Gi"

  volumeMounts:
    - name: ray-storage
      mountPath: /tmp/ray

  volumes:
    - name: ray-storage
      emptyDir: {}

  readinessProbe:
    exec:
      command: ["ray", "health-check"]
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

  livenessProbe:
    exec:
      command: ["ray", "health-check"]
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "ray stop --grace-period=30 && sleep 5"]

  terminationGracePeriodSeconds: 60

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          ray.io/node-type: head

  labels:
    ray.io/node-type: head
    app: ray
    component: head

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8265"

  env:
    - name: RAY_GRAFANA_HOST
      value: "http://grafana:3000"
    - name: RAY_PROMETHEUS_HOST
      value: "http://prometheus:9090"

  nodeSelector: {}
  tolerations: []

cpuWorkers:
  enabled: true
  groupName: cpu-group
  replicas: 3
  minReplicas: 2
  maxReplicas: 10

  rayStartParams: {}

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  volumeMounts:
    - name: ray-tmp
      mountPath: /tmp/ray

  volumes:
    - name: ray-tmp
      emptyDir: {}

  nodeSelector:
    ray.io/resource-type: cpu

  tolerations: []

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          ray.io/node-type: worker
          ray.io/resource-type: cpu

  labels:
    ray.io/node-type: worker
    ray.io/resource-type: cpu
    app: ray
    component: worker

  initContainers: []

gpuWorkers:
  enabled: true
  groupName: gpu-group
  replicas: 0
  minReplicas: 0
  maxReplicas: 5

  rayStartParams: {}

  resources:
    requests:
      cpu: "4"
      memory: "16Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "8"
      memory: "32Gi"
      nvidia.com/gpu: "1"

  volumeMounts:
    - name: ray-tmp
      mountPath: /tmp/ray

  volumes:
    - name: ray-tmp
      emptyDir:
        medium: Memory

  nodeSelector:
    ray.io/resource-type: gpu
    nvidia.com/gpu: "true"

  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          ray.io/node-type: worker
          ray.io/resource-type: gpu

  labels:
    ray.io/node-type: worker
    ray.io/resource-type: gpu
    app: ray
    component: gpu-worker

  initContainers: []

# Preferred multi-GPU worker groups. When non-empty, this overrides the legacy gpuWorkers block above.
gpuWorkerGroups: []
# Example:
# gpuWorkerGroups:
#   - groupName: inference-spot
#     replicas: 0
#     minReplicas: 0
#     maxReplicas: 3
#     rayStartParams: {}
#     resources:
#       requests:
