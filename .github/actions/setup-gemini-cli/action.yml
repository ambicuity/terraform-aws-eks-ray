name: "Setup Gemini CLI"
description: "Installs the @google/gemini-cli globally so it can be used in workflow steps."
runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install Gemini CLI
      shell: bash
      run: npm install -g @google/gemini-cli
    - name: Configure Git Identity for CI commits
      shell: bash
      run: |
        git config --global user.email "gemini-ai-agent@github-actions.local"
        git config --global user.name "Gemini AI Agent"
