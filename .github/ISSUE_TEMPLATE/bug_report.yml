name: Bug Report
description: Create a report to help us improve.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Please use this form to report bugs. Include a clear and descriptive title, steps to reproduce, and the environment.

  - type: textarea
    id: bug-description
    attributes:
      label: 👾 Description
      description: Provide a clear and descriptive explanation of the bug.
    validations:
      required: true
      
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 🔄 Steps to Reproduce
      description: What steps do we need to take to reproduce this?
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: ⚖️ Expected vs Actual Behavior
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment
      description: OS, Terraform Version, Ray Version, Kubernetes version, etc.
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 📚 Additional context
      description: Any other context, logs, or screenshots about the problem here.
    validations:
      required: false
