name: Assignment Follow-up

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  followup:
    name: Check Stale Assignments
    runs-on: ubuntu-latest
    steps:
      - name: Ping stale assignees without linked PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date();
            const NUDGE_DAYS = 3;
            const ESCALATE_DAYS = 7;
            const pingMarker = '## 📋 Assignment Check-in';

            async function hasLinkedOpenPullRequest(issueNumber) {
              const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              for (const event of timeline) {
                const referenced = event?.source?.issue;
                if (
                  event.event === 'cross-referenced' &&
                  referenced &&
                  referenced.pull_request &&
                  referenced.state === 'open'
                ) {
                  return true;
                }
              }

              const pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100,
              });

              const patterns = [
                new RegExp(`\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${issueNumber}\\b`, 'i'),
                new RegExp(`\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+https://github\\.com/${owner}/${repo}/issues/${issueNumber}\\b`, 'i'),
              ];

              return pulls.some((pull) => patterns.some((pattern) => pattern.test(pull.body || '')));
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: 'open',
              per_page: 100,
              assignee: '*'
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (issue.labels.some((l) => ['duplicate', 'status/blocked', 'status/needs-info', 'needs-info'].includes(l.name))) {
                continue;
              }

              const assignees = issue.assignees.map(a => a.login);
              if (assignees.length === 0) continue;

              let assignedAt = null;
              let lastBotPing = null;

              try {
                const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
                  owner, repo,
                  issue_number: issue.number,
                  per_page: 100
                });

                for (const event of timeline.reverse()) {
                  if (event.event === 'assigned' && !assignedAt) {
                    assignedAt = new Date(event.created_at);
                  }
                }

                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo,
                  issue_number: issue.number,
                  per_page: 50
                });

                for (const c of comments.reverse()) {
                  if (c.body && c.body.includes(pingMarker) && c.user.login === 'github-actions[bot]') {
                    lastBotPing = new Date(c.created_at);
                    break;
                  }
                }
              } catch (e) {
                console.log(`Error processing issue #${issue.number}: ${e.message}`);
                continue;
              }

              if (!assignedAt) continue;
              if (await hasLinkedOpenPullRequest(issue.number)) {
                console.log(`Issue #${issue.number}: skipping because an open linked PR exists.`);
                continue;
              }

              const daysSinceAssigned = Math.floor((now - assignedAt) / (1000 * 60 * 60 * 24));
              const daysSincePing = lastBotPing ? Math.floor((now - lastBotPing) / (1000 * 60 * 60 * 24)) : Infinity;

              if (daysSincePing < 3) continue;

              const mentions = assignees.map(a => `@${a}`).join(' ');

              if (daysSinceAssigned >= ESCALATE_DAYS) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `## 📋 Assignment Check-in\n\n` +
                        `${mentions} — this issue has been assigned for **${daysSinceAssigned} days** ` +
                        `with no linked Pull Request.\n\n` +
                        `**Please reply with a status update:**\n\n` +
                        `| Command | Action |\n|---|---|\n` +
                        `| \`/working\` | Confirm you're actively working on this |\n` +
                        `| \`/eta 2 days\` | Set an expected completion time |\n` +
                        `| \`/not-working\` | Unassign yourself so others can pick it up |\n` +
                        `| \`/blocked\` | Flag this as blocked |\n\n` +
                        `> ⚠️ If there is no response within 3 days, this issue may be unassigned ` +
                        `to keep the backlog moving.\n\n` +
                        `---\n*Automated follow-up by Assignment Tracker. Open linked PRs suppress these reminders.*`
                });

                try {
                  await github.rest.issues.addLabels({
                    owner, repo,
                    issue_number: issue.number,
                    labels: ['status/needs-info']
                  });
                } catch (e) { /* label may not exist */ }
              }
              else if (daysSinceAssigned >= NUDGE_DAYS) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `## 📋 Assignment Check-in\n\n` +
                        `Hey ${mentions} 👋 — just checking in! ` +
                        `This issue has been assigned for **${daysSinceAssigned} days**.\n\n` +
                        `How's progress? Reply with:\n` +
                        `- \`/working\` — I'm on it\n` +
                        `- \`/eta <timeframe>\` — e.g., \`/eta 2 days\`\n` +
                        `- \`/not-working\` — Unassign me\n` +
                        `- \`/blocked\` — I'm stuck on something\n\n` +
                        `---\n*Automated follow-up by Assignment Tracker. Open linked PRs suppress these reminders.*`
                });
              }

              console.log(`Issue #${issue.number}: assigned ${daysSinceAssigned} days ago to ${assignees.join(', ')}`);
            }
