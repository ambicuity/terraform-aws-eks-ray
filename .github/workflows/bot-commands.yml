name: Bot Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  handle-command:
    name: Process Command
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/')
    steps:
      - uses: actions/checkout@v6

      - name: Parse and execute command
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        with:
          script: |
            const comment = process.env.COMMENT_BODY.trim();
            const author = process.env.COMMENT_AUTHOR;
            const issueNumber = context.issue.number;
            const isPR = !!context.payload.issue.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ignoredCommands = new Set(['/ai-review', '/ai-tests', '/plan', '/replan', '/gemini']);
            const managedLabels = {
              'P0-critical': { color: 'b60205', description: 'Outage-level — drop everything' },
              'P1-high': { color: 'd93f0b', description: 'Must fix this sprint' },
              'P2-medium': { color: 'fbca04', description: 'Should fix soon' },
              'P3-low': { color: '0e8a16', description: 'Nice to have' },
              'status/in-progress': { color: 'fbca04', description: 'Actively being worked on' },
              'status/blocked': { color: 'b60205', description: 'Blocked by dependency or decision' },
              'status/needs-review': { color: '0e8a16', description: 'Ready for review' },
              'status/approved': { color: '0e8a16', description: 'Approved and ready to merge' },
              'status/needs-info': { color: 'e4e669', description: 'Waiting on reporter feedback' },
              'duplicate': { color: 'cfd3d7', description: 'This issue or pull request already exists' },
              'task': { color: '1d76db', description: 'Actionable work item created from planning' },
              'report': { color: '5319e7', description: 'Automated status or hygiene report' },
              'repo-status': { color: '0052cc', description: 'Repository health and status reporting' },
              'automation': { color: 'bfdadc', description: 'GitHub automation and workflow behavior' },
              'quality': { color: '0e8a16', description: 'Repository quality improvements' },
              'repo-hygiene': { color: '5319e7', description: 'Repository hygiene and maintenance' },
              'contribution-ready': { color: '0e8a16', description: 'Pull request meets contribution guidelines' }
            };

            // Parse command and args
            const parts = comment.split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);

            console.log(`Command: ${cmd}, Args: ${args}, Author: ${author}`);

            if (ignoredCommands.has(cmd)) {
              console.log(`Delegating ${cmd} to an installed GitHub app or agentic workflow.`);
              return;
            }

            async function react(emoji) {
              await github.rest.reactions.createForIssueComment({
                owner, repo,
                comment_id: context.payload.comment.id,
                content: emoji
              });
            }

            async function reply(body) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNumber,
                body
              });
            }

            async function ensureLabel(label) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (e) {
                if (!managedLabels[label]) {
                  throw e;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: managedLabels[label].color,
                  description: managedLabels[label].description
                });
              }
            }

            async function addLabel(label) {
              try {
                await ensureLabel(label);
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issueNumber,
                  labels: [label]
                });
              } catch (e) {
                await reply(`⚠️ Could not apply label \`${label}\`.`);
              }
            }

            async function removeLabel(label) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issueNumber,
                  name: label
                });
              } catch (e) {
                // Label may not be present — ignore
              }
            }

            async function removeLabels(labels) {
              for (const label of labels) {
                await removeLabel(label);
              }
            }

            // ========== COMMAND HANDLERS ==========

            switch (cmd) {
              case '/working':
                await removeLabels(['status/blocked', 'status/needs-review', 'status/approved', 'status/needs-info', 'status:in-progress', 'needs-review', 'approved', 'needs-info', 'needs-triage']);
                await addLabel('status/in-progress');
                await react('+1');
                await reply(`✅ @${author} is marked as working on this.`);
                break;

              case '/not-working':
                try {
                  await github.rest.issues.removeAssignees({
                    owner, repo,
                    issue_number: issueNumber,
                    assignees: [author]
                  });
                } catch (e) { /* ignore */ }
                await removeLabels(['status/in-progress', 'status/blocked', 'status/needs-review', 'status/approved', 'status/needs-info', 'status:in-progress', 'needs-review', 'approved', 'needs-info', 'needs-triage']);
                await react('+1');
                await reply(`🔄 @${author} has been unassigned. This item is available again.`);
                break;

              case '/blocked':
                await removeLabels(['status/in-progress', 'status/needs-review', 'status/approved', 'status/needs-info', 'status:in-progress', 'needs-review', 'approved', 'needs-info', 'needs-triage']);
                await addLabel('status/blocked');
                await react('eyes');
                const blockerDesc = args.length > 0 ? args.join(' ') : 'Not specified';
                await reply(
                  `🚧 @${author} flagged this as **blocked**.\n\n` +
                  `**Blocker:** ${blockerDesc}\n\n` +
                  `> Maintainers — please review and help unblock.`
                );
                break;

              case '/eta':
                if (args.length === 0) {
                  await reply('**Usage:** `/eta <timeframe>` — e.g., `/eta 2 days`, `/eta Friday`');
                  break;
                }
                const eta = args.join(' ');
                await removeLabels(['status/blocked', 'status/needs-info', 'needs-info', 'needs-triage']);
                await addLabel('status/in-progress');
                await react('+1');
                await reply(`⏰ @${author} estimates completion in **${eta}**.`);
                break;

              case '/assign':
                const assignee = args[0] ? args[0].replace('@', '') : author;
                try {
                  await github.rest.issues.addAssignees({
                    owner, repo,
                    issue_number: issueNumber,
                    assignees: [assignee]
                  });
                  await react('+1');
                } catch (e) {
                  await reply(`⚠️ Could not assign \`@${assignee}\`. They may not have access.`);
                }
                break;

              case '/unassign':
                const unassignee = args[0] ? args[0].replace('@', '') : author;
                try {
                  await github.rest.issues.removeAssignees({
                    owner, repo,
                    issue_number: issueNumber,
                    assignees: [unassignee]
                  });
                  await react('+1');
                } catch (e) {
                  await reply(`⚠️ Could not unassign \`@${unassignee}\`.`);
                }
                break;

              case '/label':
                if (args.length === 0) {
                  await reply('Usage: `/label <label-name>` — e.g., `/label P1-high`');
                  break;
                }
                await addLabel(args[0]);
                await react('+1');
                break;

              case '/unlabel':
                if (args.length === 0) {
                  await reply('Usage: `/unlabel <label-name>`');
                  break;
                }
                await removeLabel(args[0]);
                await react('+1');
                break;

              case '/priority':
                const validPriorities = ['P0-critical', 'P1-high', 'P2-medium', 'P3-low'];
                const legacyPriorities = ['priority:high', 'priority:medium', 'priority:low'];
                const pArg = args[0] ? args[0].toUpperCase() : '';
                const pLabel = validPriorities.find(p => p.startsWith(pArg));
                if (!pLabel) {
                  await reply(
                    '**Usage:** `/priority <level>`\n\n' +
                    '| Command | Label |\n|---|---|\n' +
                    '| `/priority P0` | P0-critical |\n' +
                    '| `/priority P1` | P1-high |\n' +
                    '| `/priority P2` | P2-medium |\n' +
                    '| `/priority P3` | P3-low |'
                  );
                  break;
                }
                for (const p of validPriorities) { await removeLabel(p); }
                for (const p of legacyPriorities) { await removeLabel(p); }
                await addLabel(pLabel);
                await react('+1');
                break;

              case '/status':
                const validStatuses = ['status/in-progress', 'status/blocked', 'status/needs-review', 'status/approved', 'status/needs-info'];
                const legacyStatuses = ['status:in-progress', 'needs-review', 'approved', 'needs-info', 'needs-triage'];
                const sArg = args[0] ? args[0].toLowerCase() : '';
                const statusMap = {
                  'in-progress': 'status/in-progress',
                  'blocked': 'status/blocked',
                  'review': 'status/needs-review',
                  'needs-review': 'status/needs-review',
                  'approved': 'status/approved',
                  'needs-info': 'status/needs-info'
                };
                const sLabel = statusMap[sArg];
                if (!sLabel) {
                  await reply(
                    '**Usage:** `/status <state>`\n\n' +
                    '| Command | Label |\n|---|---|\n' +
                    '| `/status in-progress` | status/in-progress |\n' +
                    '| `/status blocked` | status/blocked |\n' +
                    '| `/status review` | status/needs-review |\n' +
                    '| `/status approved` | status/approved |\n' +
                    '| `/status needs-info` | status/needs-info |'
                  );
                  break;
                }
                for (const s of validStatuses) { await removeLabel(s); }
                for (const s of legacyStatuses) { await removeLabel(s); }
                await addLabel(sLabel);
                await react('+1');
                break;

              case '/close':
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
                await react('+1');
                break;

              case '/reopen':
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issueNumber,
                  state: 'open'
                });
                await react('+1');
                break;

              case '/duplicate':
                if (args[0]) {
                  const dupNum = args[0].replace('#', '');
                  await addLabel('duplicate');
                  await reply(`Marked as duplicate of #${dupNum}.`);
                  await github.rest.issues.update({
                    owner, repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'not_planned'
                  });
                } else {
                  await reply('Usage: `/duplicate #<issue-number>`');
                }
                break;

              case '/help':
                await reply(
                  '## 🤖 Bot Commands\n\n' +
                  '### Native AI Integrations\n' +
                  '| Command | Description |\n|---|---|\n' +
                  '| `/plan` | GitHub Agentic Workflow plan breakdown (issues and discussions) |\n' +
                  '| `/gemini review` | Gemini Code Assist review on a PR |\n' +
                  '| `/gemini summary` | Gemini Code Assist PR summary |\n' +
                  '| `@coderabbitai plan` | CodeRabbit planning assistance |\n\n' +
                  '### Assignment Status\n' +
                  '| Command | Description |\n|---|---|\n' +
                  '| `/working` | Confirm you are actively working on this |\n' +
                  '| `/not-working` | Unassign yourself from this issue |\n' +
                  '| `/blocked [reason]` | Flag this as blocked |\n' +
                  '| `/eta <timeframe>` | Set expected completion time |\n\n' +
                  '### Workflow\n' +
                  '| Command | Description |\n|---|---|\n' +
                  '| `/assign [@user]` | Assign issue/PR (defaults to you) |\n' +
                  '| `/unassign [@user]` | Unassign issue/PR |\n' +
                  '| `/close` | Close this issue/PR |\n' +
                  '| `/reopen` | Reopen this issue/PR |\n' +
                  '| `/duplicate #N` | Mark as duplicate and close |\n\n' +
                  '### Labels\n' +
                  '| Command | Description |\n|---|---|\n' +
                  '| `/label <name>` | Add a label |\n' +
                  '| `/unlabel <name>` | Remove a label |\n' +
                  '| `/priority P0\\|P1\\|P2\\|P3` | Set priority |\n' +
                  '| `/status in-progress\\|blocked\\|review\\|approved\\|needs-info` | Set status |\n\n' +
                  '---\n*Type `/help` anytime to see this menu.*'
                );
                break;

              default:
                await reply(`❓ Unknown command: \`${cmd}\`. Type \`/help\` to see available commands.`);
            }
