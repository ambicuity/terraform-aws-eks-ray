name: Agent Delta — Issue Executor

# Phase 2: Execution — Triggered when 'status:triaged' label is applied to an issue.
# Delta reads queue.json, selects the highest-priority item, generates an implementation
# + test file via Gemini, runs a 3-pass pre-flight self-review, commits to a feature
# branch, and opens a Pull Request.

on:
  issues:
    types: [labeled]

concurrency:
  group: delta-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  execute:
    name: Delta — Implement Fix
    runs-on: ubuntu-latest
    # Only trigger on the exact 'status:triaged' label event
    if: github.event.label.name == 'status:triaged'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Gemini CLI
        uses: ./.github/actions/setup-gemini-cli

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ONNX Runtime for Semantic Memory
        run: pip install onnxruntime==1.17.3 numpy>=1.26.0

      - name: Run Agent Delta (Contributor) via Gemini CLI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_MODEL: gemini-2.0-flash
        run: |
          gemini -y --model gemini-2.0-flash \
            'Use the delta-executor subagent to resolve issue ${{ github.event.issue.number }}. You have my permission to execute.'
