name: Contributor Greeting

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Welcome New Contributor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Welcome to **Terraform-Driven Ray on Kubernetes**.

            Thanks for opening your first issue.

            A maintainer will review this shortly. In the meantime:
            - Review the [README](https://github.com/${{ github.repository }}#readme) for setup guidance
            - Use `/plan` on the issue if you want the official planning workflow to break the work into tasks
            - Add reproduction steps and environment details if more context is available
          pr_message: |
            Welcome to **Terraform-Driven Ray on Kubernetes**.

            Thanks for your first pull request.

            A few repo-specific checks to keep in mind:
            - `CI` is path-scoped, so only the relevant infra, app, automation, or docs jobs should run
            - `/gemini review` and `/gemini summary` are available for Gemini Code Assist
            - `@coderabbitai review` and `@coderabbitai plan` are available for CodeRabbit
            - Please keep the PR title in [Conventional Commits](https://www.conventionalcommits.org/) format

            A maintainer will review this soon.
