name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "1.9.8"
  HELM_VERSION: "3.16.4"
  OPA_VERSION: "0.63.0"
  ACTIONLINT_VERSION: "1.7.11"

jobs:
  detect-changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.detect.outputs.infra }}
      app: ${{ steps.detect.outputs.app }}
      automation: ${{ steps.detect.outputs.automation }}
      docs: ${{ steps.detect.outputs.docs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: detect
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            infra=true
            app=true
            automation=true
            docs=true
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            else
              base="$(git rev-list --max-parents=0 HEAD)"
              head="${{ github.sha }}"
            fi

            git diff --name-only "$base" "$head" | tee changed_files.txt

            matches() {
              local pattern="$1"
              if [[ -s changed_files.txt ]] && grep -Eq "$pattern" changed_files.txt; then
                echo true
              else
                echo false
              fi
            }

            infra="$(matches '^(terraform/|policies/|\.tflint\.hcl$)')"
            app="$(matches '^(helm/|workloads/|validation/)')"
            automation="$(matches '^(scripts/|tests/|\.coderabbit\.yaml$|\.github/workflows/|\.gitattributes$)')"
            docs="$(matches '^(README\.md$|CONTRIBUTING\.md$|SECURITY\.md$|ROADMAP\.md$|CHANGELOG\.md$|DEPLOYMENT\.md$|IMPLEMENTATION_SUMMARY\.md$|docs/|\.github/copilot-instructions\.md$|\.github/pull_request_template\.md$|\.github/ISSUE_TEMPLATE/|\.github/DISCUSSION_TEMPLATE/)')"
          fi

          {
            echo "infra=$infra"
            echo "app=$app"
            echo "automation=$automation"
            echo "docs=$docs"
          } >> "$GITHUB_OUTPUT"

      - name: Report change scope
        run: |
          echo "infra=${{ steps.detect.outputs.infra }}"
          echo "app=${{ steps.detect.outputs.app }}"
          echo "automation=${{ steps.detect.outputs.automation }}"
          echo "docs=${{ steps.detect.outputs.docs }}"

  infra-ci:
    name: Infra CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6.2.2

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2.3.0
        with:
          version: ${{ env.OPA_VERSION }}

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov==3.2.358

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate root module
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform validate example
        working-directory: terraform/examples/complete
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform tests
        working-directory: terraform
        run: terraform test

      - name: TFLint
        run: |
          tflint --init
          tflint --chdir=terraform

      - name: Checkov
        run: checkov -d terraform --quiet

      - name: OPA tests
        working-directory: policies
        run: opa test . -v

  app-ci:
    name: App CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compile workload and validation Python
        run: python -m compileall workloads validation

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install kube-score
        run: |
          curl -sSL \
            https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64.tar.gz \
            | tar xz kube-score
          sudo mv kube-score /usr/local/bin/kube-score
          kube-score version

      - name: Helm lint
        run: helm lint helm/ray

      - name: Helm template
        run: helm template ray-ci helm/ray > /tmp/ray-rendered.yaml

      - name: Kube-score
        run: |
          kube-score score /tmp/ray-rendered.yaml \
            --ignore-test container-security-context-privileged \
            --output-format ci

  automation-ci:
    name: Automation CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.automation == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.3.4

      - name: Install actionlint
        run: |
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${{ env.ACTIONLINT_VERSION }}/actionlint_${{ env.ACTIONLINT_VERSION }}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Compile automation Python
        run: python -m compileall scripts tests

      - name: Validate GitHub Actions workflows
        run: actionlint -color

      - name: Pytest
        run: pytest tests -q

  docs-meta:
    name: Docs Meta
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate documentation metadata
        run: |
          python - <<'PY'
          import pathlib
          import sys

          repo = pathlib.Path(".")
          targets = []
          explicit = [
              "README.md",
              "CONTRIBUTING.md",
              "SECURITY.md",
              "ROADMAP.md",
              "DEPLOYMENT.md",
              "IMPLEMENTATION_SUMMARY.md",
              "docs/ci-cd-pipelines.md",
              "docs/contributing.md",
              "docs/ai-automation.md",
              "docs/security.md",
              "docs/terraform-module.md",
              ".github/copilot-instructions.md",
              ".github/pull_request_template.md",
          ]
          for name in explicit:
              path = repo / name
              if path.exists():
                  targets.append(path)
          for root in (repo / ".github" / "ISSUE_TEMPLATE", repo / ".github" / "DISCUSSION_TEMPLATE"):
              if root.exists():
                  targets.extend(sorted(root.rglob("*")))
          targets = [path for path in targets if path.is_file() and path.suffix in {".md", ".yml", ".yaml"}]

          banned = {
              "/ai-review": "deprecated slash commands must not be documented",
              "/ai-tests": "deprecated slash commands must not be documented",
              "/replan": "deprecated slash commands must not be documented",
              "/plan": "removed planning workflow must not be documented",
              "COPILOT_GITHUB_TOKEN": "removed workflow secret must not be documented",
              "gh-aw": "removed repo-owned AI workflow layer must not be documented",
              "GitHub Agentic Workflows": "removed repo-owned AI workflow layer must not be documented",
              "ai-doc-sync.yml": "removed workflow references must be removed",
              "ai-issue-solver.yml": "removed workflow references must be removed",
              "ai-test-engineer.yml": "removed workflow references must be removed",
              "gamma-triage.yml": "removed workflow references must be removed",
              "delta-executor.yml": "removed workflow references must be removed",
              "beta-reviewer.yml": "removed workflow references must be removed",
              "alpha-governor.yml": "removed workflow references must be removed",
              "memory.yml": "removed workflow references must be removed",
              "memory-incremental.yml": "removed workflow references must be removed",
              "assignment-followup.yml": "removed workflow references must be removed",
              "bot-commands.yml": "removed workflow references must be removed",
              "ci-doctor": "removed workflow references must be removed",
              "issue-triage": "removed workflow references must be removed",
              "repository-quality-improver": "removed workflow references must be removed",
              "contribution-guidelines-checker": "removed workflow references must be removed",
              "daily-repo-status": "removed workflow references must be removed",
              "Copilot coding agent": "disabled GitHub-side agent workflow must not be documented",
              "Copilot code review": "disabled GitHub-side agent workflow must not be documented",
              "OpenAI Codex": "disabled GitHub-side agent workflow must not be documented",
              "Claude": "disabled GitHub-side agent workflow must not be documented",
              "terraform-ci.yml": "removed workflow references must be removed",
              "tfsec.yml": "removed workflow references must be removed",
              "tflint.yml": "removed workflow references must be removed",
              "checkov.yml": "removed workflow references must be removed",
              "kube-score.yml": "removed workflow references must be removed",
              "python-lint.yml": "removed workflow references must be removed",
              "markdown-links.yml": "removed workflow references must be removed",
          }
          unpinned_source = 'source = "github.com/ambicuity/Terraform-Driven-Ray-on-Kubernetes-Platform'
          failures = []
          for path in targets:
              text = path.read_text(encoding="utf-8")
              for needle, reason in banned.items():
                  if needle in text:
                      failures.append(f"{path}: {reason} (`{needle}`)")
              if unpinned_source in text:
                  failures.append(f"{path}: Terraform module source must be pinned to a git ref")

          if failures:
              print("\n".join(failures))
              sys.exit(1)
          PY

  ci-status:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, infra-ci, app-ci, automation-ci, docs-meta]
    if: always()

    steps:
      - name: Verify required jobs
        run: |
          if [[ "${{ needs.infra-ci.result }}" == "failure" ||
                "${{ needs.infra-ci.result }}" == "cancelled" ||
                "${{ needs.app-ci.result }}" == "failure" ||
                "${{ needs.app-ci.result }}" == "cancelled" ||
                "${{ needs.automation-ci.result }}" == "failure" ||
                "${{ needs.automation-ci.result }}" == "cancelled" ||
                "${{ needs.docs-meta.result }}" == "failure" ||
                "${{ needs.docs-meta.result }}" == "cancelled" ]]; then
            echo "One or more scoped CI jobs failed."
            exit 1
          fi
          echo "All required scoped CI checks passed."
