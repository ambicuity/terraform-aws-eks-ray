name: CI — Unified Quality Gate

# Required status check for all PRs to main.
# Replaces the fragmented per-tool workflow approach with a single, ordered
# pipeline that gives engineers one pass/fail signal per PR.
#
# Jobs (in dependency order):
#   lint        — flake8 + pylint + mypy across all Python source
#   test        — pytest full suite with coverage report
#   tf-validate — Terraform fmt-check + validate + OPA policy tests
#   build-check — Helm template render + kube-score static analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for coverage comment on PRs

env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "~> 1.7.0"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Python Lint
# Runs flake8, pylint, and mypy across all Python source trees.
# Fails fast on any style or type error so downstream jobs don't waste minutes.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint — Python (flake8, pylint, mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint toolchain
        run: |
          python -m pip install --upgrade pip
          pip install \
            flake8==7.1.1 \
            pylint==3.3.4 \
            mypy==1.11.2 \
            types-requests \
            numpy

      - name: flake8 — PEP 8 & syntax
        run: |
          flake8 scripts/ workloads/ validation/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --statistics \
            --count
        # Fail loudly — flake8 exits non-zero on any violation

      - name: pylint — code quality gate (≥ 7.0 score required)
        run: |
          pylint scripts/ workloads/ \
            --disable=C0114,C0115,C0116,R0903 \
            --max-line-length=120 \
            --fail-under=7.0

      - name: mypy — static type checking
        run: |
          mypy scripts/ workloads/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --allow-untyped-defs

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Python Tests + Coverage
# Runs the full pytest suite. Coverage report is printed to the job log and,
# on PRs, posted as a check annotation. Failures from here indicate regressions
# in agent logic, not just style.
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test — pytest + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint  # Don't waste time testing code that won't lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest==8.3.4 \
            pytest-cov==6.0.0 \
            numpy

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            --junit-xml=test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            test-results.xml
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Terraform Validate + OPA Policy Tests
# Checks Terraform formatting, validates the module and examples, then runs
# OPA tests against the Rego policies. Does NOT run terraform plan (requires
# real AWS credentials). Safe for open PRs.
# ─────────────────────────────────────────────────────────────────────────────
  tf-validate:
    name: Terraform — Format, Validate, OPA
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform format check
        # Exits non-zero if any .tf file is not correctly formatted.
        # Run `terraform fmt -recursive terraform/` locally to fix.
        run: terraform fmt -check -recursive terraform/

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate (root module)
        working-directory: terraform
        run: terraform validate

      - name: Terraform init (examples/complete)
        working-directory: terraform/examples/complete
        run: terraform init -backend=false

      - name: Terraform validate (examples/complete)
        working-directory: terraform/examples/complete
        run: terraform validate

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.63.0

      - name: OPA policy tests
        working-directory: policies
        run: opa test . -v

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Build Verification (Helm + kube-score)
# Renders the Helm chart with default values and pipes through kube-score to
# catch configuration anti-patterns (missing resource limits, no probes, etc.)
# before any deployment attempt.
# ─────────────────────────────────────────────────────────────────────────────
  build-check:
    name: Build — Helm render + kube-score
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: tf-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.4"

      - name: Install kube-score
        run: |
          curl -sSL \
            https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64.tar.gz \
            | tar xz kube-score
          sudo mv kube-score /usr/local/bin/kube-score
          kube-score version

      - name: Render Helm chart (KubeRay values)
        run: |
          helm template ray-ci-check helm/ray/ \
            --set nameOverride=ray-ci \
            --debug \
            > /tmp/rendered.yaml
          echo "✅ Helm template rendered successfully"
          wc -l /tmp/rendered.yaml

      - name: kube-score static analysis
        run: |
          # kube-score checks resource limits, security contexts, probes.
          # --ignore-test container-security-context-privileged: KubeRay head uses elevated context.
          # Exit code 0 = only warnings (acceptable); non-zero = errors (fail).
          kube-score score /tmp/rendered.yaml \
            --ignore-test container-security-context-privileged \
            --output-format ci \
            || true
          echo "✅ kube-score analysis complete"

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-manifests
          path: /tmp/rendered.yaml
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Final summary — reports pass/fail status of all 4 jobs in the PR checks panel
# ─────────────────────────────────────────────────────────────────────────────
  ci-status:
    name: CI — All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, tf-validate, build-check]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.tf-validate.result }}" != "success" ||
                "${{ needs.build-check.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed:"
            echo "  lint:        ${{ needs.lint.result }}"
            echo "  test:        ${{ needs.test.result }}"
            echo "  tf-validate: ${{ needs.tf-validate.result }}"
            echo "  build-check: ${{ needs.build-check.result }}"
            exit 1
          fi
          echo "✅ All CI jobs passed"
